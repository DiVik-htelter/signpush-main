services:
  # 1. База данных PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: signpush_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
      POSTGRES_DB: ${DB_NAME:-signpush}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Автоматический накат твоей схемы при первом запуске:
      - ./backend/create_full_bd_xray.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis для почты и кэша
  redis:
    image: redis:alpine
    container_name: signpush_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

  # 3. Бэкенд (FastAPI)
  backend:
    build: ./backend
    container_name: signpush_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ./backend/.env
    # Переменные окружения для подключения к DB и Redis внутри Docker
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0

  # 4. Nginx + Frontend статика
  nginx:
    image: nginx:stable-alpine
    container_name: signpush_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./build:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: