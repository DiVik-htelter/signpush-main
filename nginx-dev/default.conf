 

limit_req_zone $binary_remote_addr zone=mylimit:10m rate=1r/s;

server {
    listen 80;
    server_name localhost;

    client_max_body_size 5M; # Лимит 2 мегабайта

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_comp_level 5;

    # 1. Запросы к фронтенду (React dev server на 3000 порту)
    location / {
        proxy_pass http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # 2. Запросы к API (FastAPI dev server на 8000 порту)
    location /api/ {
        limit_req zone=mylimit burst=5;
        proxy_pass http://host.docker.internal:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Убираем /api/ из пути, если бэкенд его не ждет (зависит от твоих роутов)
        # rewrite ^/api/(.*)$ /$1 break; 
    }
}
