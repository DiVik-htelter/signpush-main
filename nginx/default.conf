# 1. Ограничение частоты запросов для защиты от перебора паролей и DoS
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

server {
    listen 80;
    server_name localhost;

    # Максимальный размер загружаемого PDF (например, 20Мб)
    client_max_body_size 20M;

    # Сжатие данных (ускоряет загрузку JS и PDF)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/pdf;

    # --- РАЗДЕЛ 1: FRONTEND (React) ---
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Важно для React Router: если путь не найден, отдаем index.html
        try_files $uri $uri/ /index.html;
    }

    # --- РАЗДЕЛ 2: КЭШИРОВАНИЕ БИБЛИОТЕК ---
    # PDF.js и шрифты не меняются часто, кэшируем их на стороне клиента
    location /pdfjs-dist/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # --- РАЗДЕЛ 3: ОБЫЧНЫЙ API (Пользователи) ---
    location /api/ {
        # Применяем лимит запросов
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- РАЗДЕЛ 4: M2M API (1C и внешние сервисы) ---
    # Путь для внешних интеграций из твоего ТЗ
    location /api/v1/ {
        # Проверка секретного ключа в заголовках
        if ($http_x_signpush_key != "super-secret-pki-token") {
            return 403;
        }

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Ошибка 404 (опционально)
    error_page 404 /index.html;
}