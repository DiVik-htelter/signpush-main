<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    
    <!-- ============================================================
         МОБИЛЬНАЯ ОПТИМИЗАЦИЯ
         ============================================================ -->
    
    <!-- Viewport для адаптивного дизайна -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
    
    <!-- Цвет темы браузера (отображается в шапке на Android) -->
    <meta name="theme-color" content="#1B9AFF" />
    
    <!-- Цвет статус-бара на iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    
    <!-- Разрешить полноэкранный режим на iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    
    <!-- Название при добавлении на главный экран -->
    <meta name="apple-mobile-web-app-title" content="SignPush" />
    <meta name="application-name" content="SignPush" />
    
    <!-- Описание приложения -->
    <meta
      name="description"
      content="SignPush - Система электронной подписи PDF документов. Подписывайте документы быстро и безопасно с любого устройства."
    />
    
    <!-- Ключевые слова для SEO -->
    <meta name="keywords" content="электронная подпись, PDF, подпись документов, ЭЦП, SignPush" />
    
    <!-- Автор -->
    <meta name="author" content="SignPush System" />
    
    <!-- Open Graph для социальных сетей -->
    <meta property="og:title" content="SignPush - Электронная подпись документов" />
    <meta property="og:description" content="Подписывайте PDF документы быстро и безопасно" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />
    
    <!-- Иконки для разных устройств -->
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/logo192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon.ico" />
    
    <!-- Отключение автоматического определения номеров телефонов (Safari) -->
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Предзагрузка для оптимизации -->
    <link rel="preconnect" href="http://127.0.0.1:8000" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Splash screen для iOS (опционально) -->
    <link rel="apple-touch-startup-image" href="%PUBLIC_URL%/logo512.png" />
    
    <title>SignPush - Электронная подпись документов</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
